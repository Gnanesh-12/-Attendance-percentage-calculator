<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="attendance.css">
    <title>Attendance Percentage Calculator</title>
</head>

<body>
    <div class="bg-glow"></div>
    <img id="img1" src="Screenshot 2025-05-06 120003.png" alt="Background Image">

    <main class="main-wrapper">
        <div class="container animate-up">
            <header>
                <h1>Attendance <span class="accent">Calculator</span></h1>
                <p class="subtitle">Plan your bunk days with precision.</p>
            </header>

            <form id="attendanceform">
                <div class="input-group">
                    <label for="percentage">Target Percentage</label>
                    <div class="select-wrapper">
                        <select id="percentage" name="percentage">
                            <option value="default" disabled selected>Select Target</option>
                            <option value="65">65%</option>
                            <option value="70">70%</option>
                            <option value="75">75%</option>
                            <option value="80">80%</option>
                            <option value="85">85%</option>
                            <option value="90">90%</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="present">Days Present</label>
                        <input type="number" id="present" name="present" placeholder="e.g. 45" required min="0">
                    </div>

                    <div class="input-group">
                        <label for="total">Total Classes</label>
                        <input type="number" id="total" name="total" placeholder="e.g. 60" required min="1">
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Calculate Now</span>
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>
    </main>
    <script src="attendance.js"></script>
</body>

</html>
